<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="お出かけクエスト">
<title>お出かけクエスト</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ホーム画面 -->
<section id="screen-home" class="screen">
  <div class="home-page">
    <div class="home-fixed-header">
      <button class="settings-icon-btn" id="btn-settings" aria-label="設定">⚙</button>
      <h1>お出かけクエスト</h1>
      <p class="sub">今日は何をしますか？</p>
      <button class="shopping-list-banner" id="btn-home-arrived">🏠 帰宅しました</button>
      <button class="shopping-list-banner" id="btn-home-shopping-list">🛒 買い物リストを見る</button>
      <button class="shopping-list-banner" id="btn-home-expiration">🗓 賞味期限を見る</button>
    </div>
    <nav class="course-list" id="course-list">
      <!-- JSでコースボタンを描画 -->
    </nav>
  </div>
</section>

<!-- チェックリスト画面 -->
<section id="screen-checklist" class="screen hidden">
  <div class="page">
    <button class="back-btn" id="btn-back-home">← ホームへ</button>
    <h1 id="checklist-title"></h1>
    <div id="checklist-body"></div>
    <button class="primary-btn" id="btn-start" disabled>開始</button>
  </div>
</section>

<!-- 出発画面 -->
<section id="screen-departure" class="screen hidden">
  <div class="page center">
    <p class="big-emoji">🎉</p>
    <p class="departure-text">忘れ物なし！</p>
    <p class="departure-sub">出発！</p>
    <button class="primary-btn" id="btn-departure-ok">ホームへ戻る</button>
  </div>
</section>

<!-- ゴール画面 -->
<section id="screen-goal" class="screen hidden">
  <div class="page center">
    <p class="goal-text">お疲れ様でした！</p>
    <p class="goal-sub" id="goal-sub">ゴール</p>
    <button class="primary-btn" id="btn-goal-ok">ホームへ戻る</button>
  </div>
</section>

<!-- 設定画面 -->
<section id="screen-settings" class="screen hidden">
  <div class="page">
    <button class="back-btn" id="btn-back-home-2">← ホームへ</button>
    <h1>設定</h1>

    <p class="setting-label">表示モード</p>
    <div class="segmented" id="theme-toggle">
      <button class="segmented-btn" data-value="light">ライト</button>
      <button class="segmented-btn" data-value="dark">ダーク</button>
    </div>

    <p class="setting-label">文字・ボタンサイズ</p>
    <div class="segmented" id="mode-toggle">
      <button class="segmented-btn" data-value="normal">通常</button>
      <button class="segmented-btn" data-value="elderly">高齢者モード</button>
    </div>

    <p class="setting-label">共通チェック項目</p>
    <div id="common-items-list" class="edit-list"></div>
    <div class="add-row">
      <input type="text" id="common-add-input" placeholder="新しい項目名" maxlength="20">
      <button id="common-add-btn" class="add-btn">＋追加</button>
    </div>

    <p class="setting-label">コース別チェック項目</p>
    <div class="segmented" id="course-edit-tabs"></div>
    <div id="course-items-list" class="edit-list"></div>
    <div class="add-row">
      <input type="text" id="course-add-input" placeholder="新しい項目名" maxlength="20">
      <button id="course-add-btn" class="add-btn">＋追加</button>
    </div>
    <button id="course-delete-btn" class="text-btn-danger">このコースを削除</button>

    <p class="setting-label">よく使う商品</p>
    <div id="frequent-items-list" class="edit-list"></div>
    <div class="add-row">
      <input type="text" id="frequent-add-input" placeholder="商品名" maxlength="20">
      <button id="frequent-add-btn" class="add-btn">＋追加</button>
    </div>

    <p class="setting-label">新しいコースを追加</p>
    <div class="icon-picker" id="new-course-icon-picker"></div>
    <div class="add-row add-row-stacked">
      <input type="text" id="new-course-name-input" placeholder="コース名" maxlength="10">
      <button id="new-course-add-btn" class="add-btn">＋コース追加</button>
    </div>
  </div>
</section>

<!-- 買い物リスト編集画面 -->
<section id="screen-shopping-edit" class="screen hidden">
  <div class="page">
    <button class="back-btn" id="btn-shopping-edit-done">← 戻る</button>
    <h1>買い物リスト</h1>
    <div id="shopping-edit-list" class="edit-list"></div>
    <div class="add-row">
      <input type="text" id="shopping-add-input" placeholder="商品名" maxlength="20">
      <button id="shopping-add-btn" class="add-btn">＋追加</button>
    </div>
    <p class="setting-label">よく使う商品から選ぶ</p>
    <select id="shopping-frequent-select" class="frequent-select">
      <option value="" disabled selected>タップして選ぶ</option>
    </select>
  </div>
</section>

<!-- 買い物リスト閲覧・チェック画面 -->
<section id="screen-shopping-view" class="screen hidden">
  <div class="page">
    <button class="back-btn" id="btn-shopping-view-back">← ホームへ</button>
    <div class="shopping-view-header">
      <h1>買い物リスト</h1>
      <button class="edit-text-btn" id="btn-shopping-view-edit">編集</button>
    </div>
    <div id="shopping-view-list"></div>
  </div>
</section>

<!-- 賞味期限画面 -->
<section id="screen-expiration" class="screen hidden">
  <div class="page">
    <button class="back-btn" id="btn-expiration-back">← ホームへ</button>
    <h1>賞味期限</h1>
    <div id="expiration-list"></div>

    <p class="setting-label">新しく登録する</p>
    <select id="expiration-frequent-select" class="frequent-select">
      <option value="" disabled selected>よく使う商品から選ぶ(任意)</option>
    </select>
    <div class="add-row add-row-stacked" style="margin-top: 10px;">
      <input type="text" id="expiration-name-input" placeholder="商品名" maxlength="20">
      <input type="date" id="expiration-date-input" class="date-input">
      <button id="expiration-add-btn" class="add-btn">＋登録</button>
    </div>
  </div>
</section>

<!-- 進行中コース確認ダイアログ -->
<div id="dialog-overlay" class="dialog-overlay hidden">
  <div class="dialog-box">
    <p class="dialog-text" id="dialog-text"></p>
    <div class="dialog-buttons">
      <button id="dialog-continue" class="dialog-btn dialog-btn-primary">終わらせる</button>
      <button id="dialog-discard" class="dialog-btn">新しく始める</button>
    </div>
  </div>
</div>

<script src="app.js?v=11"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js");
    });
  }
</script>
</body>
</html>
